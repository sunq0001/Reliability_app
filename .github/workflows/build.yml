name: Build and Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl matplotlib pillow scipy numpy
    
    - name: Build with PyInstaller
      run: |
        pyinstaller reliability_app.spec
    
    - name: Create portable zip
      run: |
        Compress-Archive -Path "dist/reliability_app" -DestinationPath "reliability_app_portable.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: reliability_app_portable
        path: reliability_app_portable.zip
    
    - name: Create Release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: reliability_app_portable.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
